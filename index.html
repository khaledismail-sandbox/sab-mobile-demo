<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>SAB Mobile</title>
  <meta name="description" content="SAB Mobile — Saudi Awwal Bank demo app instrumented with Amplitude">
  <script>
    // Base-path bootstrap — must run before any relative <link>/<script> below.
    // index.html is only ever fetched from the app's base URL (direct load, or the
    // 404.html redirect), so location.pathname here IS the base path. A <base>
    // element makes every relative asset resolve correctly even after the router
    // pushState()s to deep routes like /transfer/details.
    (function () {
      var base = location.pathname.replace(/index\.html$/, '');
      if (base.slice(-1) !== '/') base += '/';
      window.__APP_BASE__ = base;
      var b = document.createElement('base');
      b.href = base;
      document.head.appendChild(b);

      // Restore a deep route handed over by 404.html (?p=/route&q=original-query).
      // q is restored even without p so UTM params on an unknown-route deep link
      // still reach the app's UTM capture.
      var params = new URLSearchParams(location.search);
      var p = params.get('p');
      var q = params.get('q');
      if (p || q) {
        history.replaceState(null, '', base + (p ? p.replace(/^\//, '') : '') + (q ? '?' + q : '') + location.hash);
      }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">

  <!-- Amplitude: Analytics + Session Replay + Web Experiment (unified smart loader) -->

  <!-- Amplitude: Guides & Surveys -->
  <script src="https://cdn.amplitude.com/script/3a9822aacf2744f18e92c5026ca6d438.engagement.js"></script>
</head>

        </span>
      </div>
      <main id="screen" class="screen" aria-live="polite"></main>
      <nav id="tabbar" class="tabbar" hidden>
        <button class="tab" data-tab="home" data-route="/home"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg><span>Home</span></button>
